name: Docker Build and Push

on:
  push:
    branches:
      - main

jobs:
  docker-build:

    runs-on: ubuntu-latest
    environment: prod 

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t nandanlagad/cloud-automation-lab:latest .

      - name: Push Docker Image
        run: |
          docker push nandanlagad/cloud-automation-lab:latest

  deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            docker pull nandanlagad/cloud-automation-lab:latest

            docker stop cloud-app || true

            docker rm cloud-app || true

            docker image prune -af

            docker run -d \
              --restart unless-stopped \
              -p 80:80 \
              --name cloud-app \
              nandanlagad/cloud-automation-lab:latest
            docker ps
